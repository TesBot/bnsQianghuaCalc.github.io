<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>剑灵怀旧服（仙幻赛季）- 装备强化计算器</title>
  <link rel="icon" href="BnS.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <header class="header">
      <h1><img src="BnS.ico" alt="" class="header-icon"> 剑灵怀旧服（仙幻赛季）装备强化计算器</h1>
    </header>

    <!-- 输入区域 -->
    <section class="input-section">
      <!-- 第一行：模式选择（按钮） -->
      <div class="mode-row">
        <button class="mode-btn active" data-mode="1">📊 升级目标消耗</button>
        <button class="mode-btn" data-mode="2">📈 可强化最大等级</button>
      </div>

      <!-- 第二行：装备+品阶+等级 -->
      <div class="row-1">
        <div class="equip-select-wrapper">
          <label class="select-label">选择装备</label>
          <div class="equip-select-box">
            <img id="equip-preview-img" src="images/真仙幻武器.png" alt="">
            <span class="select-text" id="equip-select-text">武器</span>
            <select id="equip-select">
              <option value="weapon">武器</option>
              <option value="ring">戒指</option>
              <option value="earring">耳环</option>
              <option value="necklace">项链</option>
              <option value="bracelet">手镯</option>
              <option value="belt">腰带</option>
              <option value="gloves">手套</option>
            </select>
          </div>
        </div>

        <div class="quality-select-wrapper">
          <label class="select-label">装备品阶</label>
          <select id="quality-select" class="select-control">
            <option value="green">仙幻武器</option>
            <option value="blue">耀眼仙幻武器</option>
            <option value="purple">觉醒仙幻武器</option>
            <option value="orange" selected>真仙幻武器</option>
          </select>
        </div>

        <div class="level-wrapper">
          <label class="select-label">设置当前或目标等级</label>
          <div class="level-inline">
            <select id="current-level" class="level-select">
              <option value="0">无</option>
            </select>
            <span class="level-arrow" id="level-arrow">→</span>
            <select id="target-level" class="level-select">
              <option value="1">+1</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 第二行：装备图片 + 已有材料 -->
      <div class="row-2">
        <div class="equip-preview">
          <img id="equip-image" src="images/真仙幻武器.png" alt="装备图片">
          <div class="equip-name" id="equip-name">真仙幻武器</div>
          <div class="strategy-wrapper">
            <span class="strategy-label">升级强化石不足时：</span>
            <select id="strategy-select" class="select-sm">
              <option value="split">优先分解</option>
              <option value="merge">优先合成</option>
            </select>
          </div>
        </div>

        <div class="materials-input">
          <div class="material-group">
            <div class="group-title">已有强化石 <span id="stone-type-name">(仙幻武器强化石)</span></div>
            <div class="input-row single-line">
              <div class="input-box">
                <span class="dot green"></span>
                <label>普通</label>
                <input type="number" id="stone-green" placeholder="0" min="0">
              </div>
              <div class="input-box">
                <span class="dot blue"></span>
                <label>耀眼</label>
                <input type="number" id="stone-blue" placeholder="0" min="0">
              </div>
              <div class="input-box">
                <span class="dot purple"></span>
                <label>觉醒</label>
                <input type="number" id="stone-purple" placeholder="0" min="0">
              </div>
              <div class="input-box">
                <span class="dot orange"></span>
                <label>灿烂</label>
                <input type="number" id="stone-orange" placeholder="0" min="0">
              </div>
            </div>
          </div>

          <div class="material-group">
            <div class="group-title">已有箱子 <span id="box-type-info">(1号箱:武器/戒指/耳环/项链)</span></div>
            <div class="input-row single-line">
              <div class="input-box">
                <span class="dot green"></span>
                <label>普通</label>
                <input type="number" id="box-green" placeholder="0" min="0">
              </div>
              <div class="input-box">
                <span class="dot blue"></span>
                <label>耀眼</label>
                <input type="number" id="box-blue" placeholder="0" min="0">
              </div>
              <div class="input-box">
                <span class="dot purple"></span>
                <label>觉醒</label>
                <input type="number" id="box-purple" placeholder="0" min="0">
              </div>
              <div class="input-box">
                <span class="dot orange"></span>
                <label>灿烂</label>
                <input type="number" id="box-orange" placeholder="0" min="0">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 第三行：操作按钮 -->
      <div class="row-3">
        <button class="btn-calc" id="calc-btn">🧮 开始计算</button>
        <button class="btn-reset" id="reset-inventory-btn">🗑️ 重置库存</button>
      </div>
    </section>

    <!-- 输出区域 -->
    <section class="output-section" id="output-section">
      <div class="output-header">
        <h2>📋 计算结果</h2>
      </div>

      <div class="output-body">
        <!-- 开箱与转换方案 -->
        <div class="result-block" id="result-steps">
          <h3>开箱与转换方案</h3>
          <div class="steps-content">点击"计算"查看方案</div>
        </div>

        <!-- 材料需求汇总 -->
        <div class="result-block" id="result-needs">
          <h3>材料需求汇总</h3>
          <div class="needs-content"></div>
        </div>

        <!-- 金币消耗 -->
        <div class="result-block" id="result-gold">
          <h3>金币消耗</h3>
          <div class="gold-content"></div>
        </div>

        <!-- 属性收益 -->
        <div class="result-block" id="result-attrs">
          <h3>攻击属性收益</h3>
          <div class="attrs-content"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="js/data.js?v=1"></script>
  <script src="js/calculator.js?v=1"></script>
  <script src="js/app.js?v=1"></script>
</body>
</html>
